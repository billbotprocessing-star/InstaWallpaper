<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── THEME TOKENS ── */
body{
  --bg:#000;--surface:#000;--nav-bg:rgba(0,0,0,.92);
  --border:#262626;--text:#f5f5f5;--sub:#a8a8a8;--accent:#0095f6;
  --btn-bg:#262626;--btn-text:#f5f5f5;--btn-border:#363636;
  --story-ring:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  transition:background .5s,color .4s;
}

body.theme-dark{--bg:#111827;--surface:#161f2e;--nav-bg:rgba(17,24,39,.92);--border:#2b3648;--text:#f8fafc;--sub:#aab6c5;--accent:#60a5fa;--btn-bg:#243044;--btn-text:#f8fafc;--btn-border:#344258;}
body.theme-light{--bg:#f3f4f6;--surface:#ffffff;--nav-bg:rgba(255,255,255,.94);--border:#d1d5db;--text:#1f2937;--sub:#6b7280;--accent:#2563eb;--btn-bg:#e5e7eb;--btn-text:#1f2937;--btn-border:#d1d5db;}
body.theme-sakura{--bg:#3b1728;--surface:#4a1f33;--nav-bg:rgba(59,23,40,.92);--border:#70344f;--text:#fff1f6;--sub:#e9a9bf;--accent:#f472b6;--btn-bg:#5c2940;--btn-text:#fff1f6;--btn-border:#793a57;}
body.theme-forest{--bg:#13251a;--surface:#1b3324;--nav-bg:rgba(19,37,26,.92);--border:#31543d;--text:#effaf1;--sub:#9fcfaa;--accent:#4ade80;--btn-bg:#254532;--btn-text:#effaf1;--btn-border:#3a6047;}
body.theme-dusk{--bg:#211a3d;--surface:#2d2452;--nav-bg:rgba(33,26,61,.92);--border:#4c3f78;--text:#f5f0ff;--sub:#c4b5fd;--accent:#a78bfa;--btn-bg:#3a3064;--btn-text:#f5f0ff;--btn-border:#5b4a86;}
body.theme-sand{--bg:#3a2a1d;--surface:#493524;--nav-bg:rgba(58,42,29,.92);--border:#6f5238;--text:#fff7ed;--sub:#d8b38a;--accent:#f59e0b;--btn-bg:#5a422d;--btn-text:#fff7ed;--btn-border:#76583d;}
body.theme-arctic{--bg:#102a43;--surface:#173957;--nav-bg:rgba(16,42,67,.92);--border:#2f5f83;--text:#eff8ff;--sub:#9cc9e6;--accent:#38bdf8;--btn-bg:#214d70;--btn-text:#eff8ff;--btn-border:#35698d;}
body.theme-ember{--bg:#3a1b12;--surface:#4a2518;--nav-bg:rgba(58,27,18,.92);--border:#743c29;--text:#fff1e8;--sub:#f0a37e;--accent:#fb923c;--btn-bg:#5d3020;--btn-text:#fff1e8;--btn-border:#7c4631;}
body.theme-mint{--bg:#102d2a;--surface:#173c38;--nav-bg:rgba(16,45,42,.92);--border:#2d625b;--text:#ecfffb;--sub:#8ed6cc;--accent:#2dd4bf;--btn-bg:#214f49;--btn-text:#ecfffb;--btn-border:#367169;}

/* ════════════════════════════════════════════════
   WALLPAPER LAYER  (::before = static/animated bg)
   ════════════════════════════════════════════════ */
body[class*="wp-"]::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
}

/* ── 1. GALAXY  (animated star drift) ── */
@keyframes starDrift{0%{transform:translateY(0) rotate(0deg)}100%{transform:translateY(-120px) rotate(1deg)}}
body.wp-galaxy::before{
  background:#000
    radial-gradient(1px 1px at 10% 20%,#fff 0%,transparent 100%),
    radial-gradient(1px 1px at 30% 60%,rgba(255,255,255,.9) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 50% 10%,#fff 0%,transparent 100%),
    radial-gradient(1px 1px at 70% 40%,rgba(255,255,255,.7) 0%,transparent 100%),
    radial-gradient(2px 2px at 85% 75%,rgba(200,180,255,.9) 0%,transparent 100%),
    radial-gradient(1px 1px at 20% 85%,rgba(255,255,255,.8) 0%,transparent 100%),
    radial-gradient(1px 1px at 60% 55%,rgba(255,255,255,.6) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 90% 25%,rgba(180,200,255,.9) 0%,transparent 100%),
    radial-gradient(1px 1px at 40% 90%,rgba(255,255,255,.7) 0%,transparent 100%),
    radial-gradient(ellipse at 40% 50%,rgba(100,40,180,.25) 0%,transparent 60%),
    radial-gradient(ellipse at 70% 30%,rgba(40,80,200,.2) 0%,transparent 50%);
  background-size:400px 400px,400px 400px,400px 400px,400px 400px,400px 400px,400px 400px,400px 400px,400px 400px,400px 400px,100% 100%,100% 100%;
  animation:starDrift 18s linear infinite;
}

/* ── 2. LAVA  (pulsing molten cracks) ── */
@keyframes lavaPulse{0%,100%{opacity:.9;filter:brightness(1)}50%{opacity:1;filter:brightness(1.3)}}
@keyframes lavaShift{0%{background-position:0% 0%}50%{background-position:100% 100%}100%{background-position:0% 0%}}
body.wp-lava::before{
  background:#1a0000;
  background-image:
    radial-gradient(ellipse at 50% 100%,rgba(255,60,0,.5) 0%,transparent 60%),
    radial-gradient(ellipse at 20% 80%,rgba(255,120,0,.35) 0%,transparent 40%),
    radial-gradient(ellipse at 80% 90%,rgba(200,30,0,.4) 0%,transparent 40%),
    repeating-linear-gradient(80deg,transparent 0px,transparent 18px,rgba(255,80,0,.07) 18px,rgba(255,80,0,.07) 19px),
    repeating-linear-gradient(170deg,transparent 0px,transparent 22px,rgba(255,40,0,.05) 22px,rgba(255,40,0,.05) 23px);
  background-size:100% 100%,100% 100%,100% 100%,100% 100%,100% 100%;
  animation:lavaPulse 3s ease-in-out infinite, lavaShift 12s ease-in-out infinite;
}

/* ── 3. AURORA BOREALIS  (slow colour sweep) ── */
@keyframes aurora{
  0%  {background-position:0% 50%}
  50% {background-position:100% 50%}
  100%{background-position:0% 50%}
}
body.wp-aurora::before{
  background:linear-gradient(270deg,
    #001a00,#003020,#004840,#006060,
    #004080,#0020a0,#200060,#400040,
    #001a00);
  background-size:600% 600%;
  animation:aurora 14s ease infinite;
  opacity:.75;
}

/* ── 4. SUNSET DRIFT  (warm animated gradient) ── */
@keyframes sunsetDrift{
  0%  {background-position:0% 50%}
  50% {background-position:100% 50%}
  100%{background-position:0% 50%}
}
body.wp-sunset::before{
  background:linear-gradient(270deg,#0d0030,#3a0060,#800080,#c0304a,#e85020,#ff9000,#ffe060,#ff9000,#e85020,#c0304a,#800080,#3a0060,#0d0030);
  background-size:600% 600%;
  animation:sunsetDrift 16s ease infinite;
  opacity:.55;
}

/* ── 5. DEEP SEA  (wave shimmer) ── */
@keyframes seaWave{
  0%  {transform:scaleX(1)   translateY(0)}
  50% {transform:scaleX(1.04) translateY(-8px)}
  100%{transform:scaleX(1)   translateY(0)}
}
body.wp-deepsea::before{
  background:
    radial-gradient(ellipse at 50% 120%,rgba(0,180,200,.35) 0%,transparent 60%),
    radial-gradient(ellipse at 20% 80%, rgba(0,100,180,.3)  0%,transparent 50%),
    radial-gradient(ellipse at 80% 60%, rgba(0,60,140,.25)  0%,transparent 50%),
    repeating-linear-gradient(180deg,transparent 0,transparent 18px,rgba(0,200,230,.05) 18px,rgba(0,200,230,.05) 19px),
    linear-gradient(180deg,#000d1a 0%,#00203a 60%,#001830 100%);
  animation:seaWave 7s ease-in-out infinite;
}

/* ── 6. NEON PULSE  (colour-cycling glow) ── */
@keyframes neonCycle{
  0%  {filter:hue-rotate(0deg)  brightness(1)}
  50% {filter:hue-rotate(180deg) brightness(1.15)}
  100%{filter:hue-rotate(360deg) brightness(1)}
}
body.wp-neon::before{
  background:
    radial-gradient(ellipse at 0%   50%,rgba(255,0,150,.22)  0%,transparent 55%),
    radial-gradient(ellipse at 100% 50%,rgba(0,255,200,.22)  0%,transparent 55%),
    radial-gradient(ellipse at 50%  0%, rgba(100,0,255,.18)  0%,transparent 50%),
    radial-gradient(ellipse at 50% 100%,rgba(0,200,255,.15)  0%,transparent 50%);
  animation:neonCycle 8s linear infinite;
}

/* ── 7. SPIDER WEB  (static geometric) ── */
body.wp-web::before{
  background-image:
    repeating-radial-gradient(circle at 50% 50%,transparent 0,transparent 38px,rgba(255,255,255,.04) 38px,rgba(255,255,255,.04) 39px),
    repeating-linear-gradient(0deg,  transparent,transparent 38px,rgba(255,255,255,.03) 38px,rgba(255,255,255,.03) 39px),
    repeating-linear-gradient(90deg, transparent,transparent 38px,rgba(255,255,255,.03) 38px,rgba(255,255,255,.03) 39px),
    repeating-linear-gradient(45deg, transparent,transparent 27px,rgba(255,255,255,.025) 27px,rgba(255,255,255,.025) 28px),
    repeating-linear-gradient(-45deg,transparent,transparent 27px,rgba(255,255,255,.025) 27px,rgba(255,255,255,.025) 28px);
}

/* ── 8. MARBLE  (fine veins) ── */
body.wp-marble::before{
  background:#111;
  background-image:
    repeating-linear-gradient(135deg,rgba(255,255,255,.045) 0px,rgba(255,255,255,.045) 1px,transparent 1px,transparent 44px),
    repeating-linear-gradient( 45deg,rgba(255,255,255,.03)  0px,rgba(255,255,255,.03)  1px,transparent 1px,transparent 66px),
    repeating-linear-gradient(160deg,rgba(255,255,255,.02)  0px,rgba(255,255,255,.02)  1px,transparent 1px,transparent 90px),
    radial-gradient(ellipse at 30% 40%,rgba(200,200,220,.08) 0%,transparent 60%),
    radial-gradient(ellipse at 70% 60%,rgba(180,180,200,.06) 0%,transparent 50%);
}

/* ── 9. BOTANICAL (leaf pattern) ── */
body.wp-botanical::before{
  background:
    radial-gradient(ellipse 40px 70px at 15% 20%, rgba(40,140,60,.18) 0%,transparent 100%),
    radial-gradient(ellipse 30px 55px at 35% 70%, rgba(20,120,50,.14) 0%,transparent 100%),
    radial-gradient(ellipse 45px 80px at 60% 35%, rgba(50,160,70,.16) 0%,transparent 100%),
    radial-gradient(ellipse 35px 60px at 80% 75%, rgba(30,130,55,.15) 0%,transparent 100%),
    radial-gradient(ellipse 25px 50px at 90% 20%, rgba(40,150,65,.12) 0%,transparent 100%),
    radial-gradient(ellipse 50px 90px at 50% 90%, rgba(20,110,45,.13) 0%,transparent 100%);
  background-size:300px 300px;
}

/* ── 10. PRISM RAIN  (animated diagonal colour streaks) ── */
@keyframes prismRain{0%{background-position:0 0}100%{background-position:0 200px}}
body.wp-prism::before{
  background-image:
    repeating-linear-gradient(90deg,
      rgba(255,0,100,.07)   0px, rgba(255,0,100,.07)   2px,
      rgba(255,120,0,.06)   4px, rgba(255,120,0,.06)   6px,
      rgba(255,230,0,.05)   8px, rgba(255,230,0,.05)  10px,
      rgba(0,220,100,.06)  12px, rgba(0,220,100,.06)  14px,
      rgba(0,160,255,.07)  16px, rgba(0,160,255,.07)  18px,
      rgba(140,0,255,.06)  20px, rgba(140,0,255,.06)  22px,
      transparent          22px, transparent          60px),
    repeating-linear-gradient(180deg,
      transparent 0px, transparent 8px,
      rgba(255,255,255,.02) 8px, rgba(255,255,255,.02) 9px);
  animation:prismRain 4s linear infinite;
}

/* ── 11. GLITCH  (horizontal scan-line flicker) ── */
@keyframes glitch1{0%,90%,100%{clip-path:inset(0 0 98% 0);transform:translate(-4px)}45%{clip-path:inset(30% 0 60% 0);transform:translate(4px)}}
@keyframes glitch2{0%,80%,100%{clip-path:inset(50% 0 40% 0);transform:translate(3px)}40%{clip-path:inset(70% 0 15% 0);transform:translate(-3px)}}
@keyframes scanline{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
body.wp-glitch::before{
  background:
    repeating-linear-gradient(0deg,rgba(0,255,180,.03) 0px,rgba(0,255,180,.03) 1px,transparent 1px,transparent 4px),
    radial-gradient(ellipse at 20% 40%,rgba(0,255,100,.1) 0%,transparent 40%),
    radial-gradient(ellipse at 80% 60%,rgba(255,0,100,.08) 0%,transparent 40%),
    #080808;
}
body.wp-glitch::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:linear-gradient(transparent 50%,rgba(0,255,180,.015) 50%);
  background-size:100% 4px;
  animation:scanline 8s linear infinite;
  opacity:.6;
}

/* ── 12. CONFETTI  (static colour dots) ── */
body.wp-confetti::before{
  background-image:
    radial-gradient(circle at 10% 15%,rgba(255,80,80,.22)  2px,transparent 2px),
    radial-gradient(circle at 25% 55%,rgba(80,200,255,.2)  2px,transparent 2px),
    radial-gradient(circle at 45% 25%,rgba(255,220,0,.2)   2px,transparent 2px),
    radial-gradient(circle at 65% 70%,rgba(200,80,255,.2)  2px,transparent 2px),
    radial-gradient(circle at 80% 35%,rgba(80,255,140,.2)  2px,transparent 2px),
    radial-gradient(circle at 90% 80%,rgba(255,140,0,.2)   2px,transparent 2px),
    radial-gradient(circle at 55% 90%,rgba(255,80,160,.18) 2px,transparent 2px),
    radial-gradient(circle at 35% 80%,rgba(80,160,255,.2)  2px,transparent 2px);
  background-size:220px 220px;
}






/* ── WAVY PATTERN (animated retro waves) ── */
body.wp-wavy-pattern::before{
  --s: 140px;
  --c1: #AB3E5B;
  --c2: #FFBE40;
  --c3: #ACCEC0;
  --c4: #61A6AB;
  --_g:
    #0000 25%,#0008 47%,var(--c1) 53% 147%,var(--c2) 153% 247%,
    var(--c1) 253% 347%,var(--c2) 353% 447%,var(--c1) 453% 547%,#0008 553%,#0000 575%;
  --_s: calc(25%/3) calc(25%/4) at 50%;
  background:
    radial-gradient(var(--_s) 100%,var(--_g)),
    radial-gradient(var(--_s) 100%,var(--_g)) calc(var(--s)/2) calc(3*var(--s)/4),
    radial-gradient(var(--_s) 0,var(--_g)) calc(var(--s)/2) 0,
    radial-gradient(var(--_s) 0,var(--_g)) 0 calc(3*var(--s)/4),
    repeating-linear-gradient(90deg,var(--c3) calc(25%/-6) calc(25%/6),var(--c4) 0 calc(25%/2));
  background-size: var(--s) calc(3*var(--s)/2);
  animation:wavyMove 2.5s infinite linear;
  opacity:1;
}

@keyframes wavyMove{
  to{
    background-position:
      var(--s) 0,
      calc(var(--s)/-2) calc(3*var(--s)/4),
      calc(3*var(--s)/2) 0,
      calc(-1*var(--s)) calc(3*var(--s)/4),
      0 0;
  }
}

@media(max-width:700px){
  body.wp-wavy-pattern::before{
    --s: 110px;
    animation-duration:3.4s;
  }
}

/* ── 13. COLORDROP (animated falling color columns) ── */
body.wp-colordrop::before{
  background:#000;
  opacity:1;
}

.colordrop-wrap{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  display:none;
  opacity:0;
  overflow:hidden;
  background:#000;
  transition:opacity .35s ease;
}

body.wp-colordrop .colordrop-wrap{
  display:block;
  opacity:1;
}

.color-drop-col{
  --drop-height:400px;
  --dot-size:.9vw;
  position:absolute;
  top:0;
  height:var(--drop-height);
  width:var(--drop-width, .69444%);
  margin-top:calc(var(--drop-height) * -1);
  left:calc(var(--i) * var(--drop-width, .69444%));
  background-image:linear-gradient(to bottom,#000,hsla(var(--hue),100%,50%,.8));
  animation:colorDrop 4s infinite ease-in;
  animation-delay:var(--delay);
  will-change:transform,opacity;
}

.color-drop-col::after{
  content:'';
  position:absolute;
  width:var(--dot-size);
  height:var(--dot-size);
  border-radius:50%;
  left:50%;
  bottom:calc(var(--dot-size) / -2);
  margin-left:calc(var(--dot-size) / -2);
  background:hsla(var(--hue),100%,50%,1);
  box-shadow:0 0 14px hsla(var(--hue),100%,55%,.8);
}

@keyframes colorDrop{
  0%{transform:translate3d(0,0,0);opacity:1}
  80%{opacity:1}
  100%{transform:translate3d(0,150vh,0);opacity:0}
}



/* ── STAINED GLASS (animated color bloom) ── */
.stained-glass-wrap{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  display:none;
  opacity:0;
  overflow:hidden;
  background:#102033;
  transition:opacity .35s ease;
}

body.wp-stained-glass .stained-glass-wrap{
  display:block;
  opacity:1;
}

.stained-glass-wrap .glass-dot{
  position:fixed;
  top:50%;
  left:50%;
  width:3em;
  height:3em;
  color:transparent;
  font:52px/1.3 serif;
  content:'V';
  mix-blend-mode:screen;
  will-change:transform;
  transform-origin:center;
}

.stained-glass-wrap .glass-dot::before{
  content:'V';
}

   These only activate on dark/busy wallpaper modes so quieter themes stay simple. */
body.wp-colordrop,
body.wp-stained-glass,

body.wp-prism{--busy-btn-hue:180deg;}

body.wp-sunset{--busy-btn-hue:24deg;}
body.wp-aurora,
body.wp-botanical{--busy-btn-hue:135deg;}

body.wp-colordrop .row-username .btn:not(.btn-more),

  --border-radius:24px;
  --padding:4px;
  --transition:.4s;
  --button-color:rgba(8,8,8,.74);
  --highlight-color-hue:var(--busy-btn-hue);
  position:relative;
  isolation:isolate;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:30px;
  padding:.48em .95em;
  border-radius:var(--border-radius);
  border:solid 1px rgba(255,255,255,.22);
  background-color:var(--button-color);
  color:#fff;
  overflow:visible;
  opacity:1;
  box-shadow:
    inset 0 1px 1px rgba(255,255,255,.2),
    inset 0 2px 2px rgba(255,255,255,.15),
    inset 0 4px 4px rgba(255,255,255,.1),
    inset 0 8px 8px rgba(255,255,255,.05),
    0 8px 22px rgba(0,0,0,.34);
  transition:box-shadow var(--transition),border var(--transition),background-color var(--transition),transform .2s;
}

body.wp-stained-glass .row-username .btn:not(.btn-more)::before,
body.wp-wavy-pattern .row-username .btn:not(.btn-more)::before,

body.wp-prism .row-username .btn:not(.btn-more)::before,
body.wp-glitch .row-username .btn:not(.btn-more)::before,

  content:'';
  position:absolute;
  top:calc(0px - var(--padding));
  left:calc(0px - var(--padding));
  width:calc(100% + var(--padding) * 2);
  height:calc(100% + var(--padding) * 2);
  border-radius:calc(var(--border-radius) + var(--padding));
  pointer-events:none;
  background-image:linear-gradient(0deg,rgba(0,0,0,.25),rgba(0,0,0,.62));
  z-index:-1;
  box-shadow:1px 1px 1px rgba(255,255,255,.14),2px 2px 2px rgba(255,255,255,.08),-1px -1px 1px rgba(0,0,0,.2),-2px -2px 2px rgba(0,0,0,.1);
  transition:box-shadow var(--transition),filter var(--transition);
}

  transition:opacity var(--transition),filter var(--transition);

body.wp-wavy-pattern .row-username .btn:not(.btn-more):active,
body.wp-lava .row-username .btn:not(.btn-more):active,
body.wp-aurora .row-username .btn:not(.btn-more):active,
body.wp-sunset .row-username .btn:not(.btn-more):active,
body.wp-deepsea .row-username .btn:not(.btn-more):active,
body.wp-neon .row-username .btn:not(.btn-more):active,
body.wp-web .row-username .btn:not(.btn-more):active,
body.wp-botanical .row-username .btn:not(.btn-more):active,
body.wp-prism .row-username .btn:not(.btn-more):active,

/* everything above the pseudo-elements */
.ig-nav,.ig-app,.theme-fab,.theme-panel{position:relative;z-index:1;}

/* ── NAV ── */
.ig-nav{position:sticky;top:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:44px;display:flex;align-items:center;transition:background .4s,border-color .4s;}
.ig-nav-inner{max-width:935px;margin:0 auto;width:100%;padding:0 16px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{font-size:1.2rem;font-weight:700;letter-spacing:-.5px;color:var(--text);}
.nav-right{display:flex;gap:20px;align-items:center;}
.nav-icon{width:24px;height:24px;fill:none;stroke:var(--text);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* ── MAIN ── */
.ig-app{max-width:935px;margin:0 auto;padding:0 16px;}

/* ── PROFILE HEADER ── */
.profile-header{display:flex;align-items:flex-start;gap:28px;padding:24px 0 20px;}
.avatar-col{flex-shrink:0;}
.avatar-ring-wrap{width:90px;height:90px;border-radius:50%;background:var(--story-ring);padding:2px;cursor:pointer;transition:opacity .15s;}
.avatar-ring-wrap:hover{opacity:.9;}
.avatar-inner{width:100%;height:100%;border-radius:50%;border:2px solid var(--surface);background:var(--btn-bg);display:flex;align-items:center;justify-content:center;font-size:2.6rem;overflow:hidden;}
.avatar-inner img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.profile-info{flex:1;min-width:0;}
.row-username{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.username{font-size:1.18rem;font-weight:300;color:var(--text);letter-spacing:.2px;}
.btn{padding:5px 14px;border-radius:8px;font-size:.82rem;font-weight:600;border:1px solid var(--btn-border);cursor:pointer;background:var(--btn-bg);color:var(--btn-text);transition:opacity .15s;white-space:nowrap;}
.btn:hover{opacity:.75;}
.btn-follow{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-more{padding:5px 8px;font-size:1rem;}
.stats-row{display:flex;gap:0;margin-bottom:12px;}
.stat{margin-right:40px;}
.stat-num{font-size:.93rem;font-weight:700;color:var(--text);}
.stat-label{font-size:.93rem;color:var(--text);}
.bio-name{font-size:.87rem;font-weight:700;color:var(--text);margin-bottom:2px;}
.bio-text{font-size:.87rem;color:var(--text);line-height:1.4;}
.mutual-row{display:flex;align-items:center;gap:8px;margin-top:10px;}
.mutual-avatars{display:flex;}
.mutual-avatar{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--surface);margin-right:-6px;background:linear-gradient(135deg,#888,#555);font-size:.6rem;display:flex;align-items:center;justify-content:center;color:#fff;}
.mutual-text{font-size:.74rem;color:var(--sub);margin-left:10px;}
.mutual-text strong{color:var(--text);}

/* ── HIGHLIGHTS ── */
.highlights-row{display:flex;gap:16px;padding:14px 0;overflow-x:auto;scrollbar-width:none;}
.highlights-row::-webkit-scrollbar{display:none;}
.hl-item{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;flex-shrink:0;}
.hl-ring{width:64px;height:64px;border-radius:50%;border:1px solid var(--border);background:var(--btn-bg);display:flex;align-items:center;justify-content:center;font-size:1.6rem;}
.hl-new{width:64px;height:64px;border-radius:50%;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;position:relative;}
.hl-plus{position:absolute;bottom:0;right:0;width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;font-size:1rem;line-height:20px;text-align:center;border:2px solid var(--surface);}
.hl-label{font-size:.7rem;color:var(--text);max-width:68px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── TABS ── */
.profile-tabs{display:flex;border-top:1px solid var(--border);}
.tab{flex:1;padding:11px 0;display:flex;align-items:center;justify-content:center;border-top:1px solid transparent;margin-top:-1px;cursor:pointer;transition:border-color .15s;}
.tab.active{border-color:var(--text);}
.tab svg{width:22px;height:22px;fill:none;stroke:var(--sub);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:stroke .15s;}
.tab.active svg{stroke:var(--text);}

/* ── POST GRID ── */
.post-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;padding-bottom:80px;}
.post-cell{aspect-ratio:1;background:var(--btn-bg);position:relative;overflow:hidden;cursor:pointer;isolation:isolate;}
.post-bg{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:flex-start;background:#111;transition:filter .2s,transform .25s;overflow:hidden;}
.post-cell:hover .post-bg{filter:brightness(.62);transform:scale(1.035);}
.post-bg::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.16),transparent 36%,rgba(0,0,0,.46));z-index:1;}
.post-bg::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 25% 18%,rgba(255,255,255,.22),transparent 22%),radial-gradient(circle at 80% 80%,rgba(0,0,0,.25),transparent 36%);mix-blend-mode:screen;opacity:.45;z-index:2;}
.post-bg.is-video::after{background:repeating-linear-gradient(0deg,rgba(255,255,255,.06) 0 1px,transparent 1px 4px),radial-gradient(circle at 70% 30%,rgba(255,255,255,.22),transparent 24%);mix-blend-mode:overlay;opacity:.7;}
.media-chip{position:absolute;top:7px;left:7px;z-index:4;font-size:.48rem;font-weight:800;letter-spacing:.7px;color:#fff;background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.2);border-radius:999px;padding:3px 6px;backdrop-filter:blur(5px);}
.media-subject{position:relative;z-index:4;margin:0 8px 9px;max-width:78%;font-size:.66rem;line-height:1.15;font-weight:800;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.8);letter-spacing:.1px;}
.media-photo-icon{position:absolute;top:7px;right:7px;z-index:4;width:18px;height:18px;border:1.7px solid rgba(255,255,255,.95);border-radius:3px;opacity:.92;}
.media-photo-icon::before{content:'';position:absolute;width:4px;height:4px;border-radius:50%;background:#fff;top:3px;right:3px;}
.media-photo-icon::after{content:'';position:absolute;left:3px;right:3px;bottom:3px;height:7px;background:linear-gradient(135deg,transparent 45%,#fff 46% 55%,transparent 56%),linear-gradient(45deg,transparent 40%,#fff 41% 55%,transparent 56%);}
.post-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:4;opacity:.88;pointer-events:none;}
.post-play span{width:42px;height:42px;border-radius:50%;background:rgba(0,0,0,.42);border:1px solid rgba(255,255,255,.28);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(0,0,0,.35);}
.post-play svg{width:18px;height:18px;margin-left:2px;fill:#fff;filter:drop-shadow(0 1px 3px rgba(0,0,0,.8));}
.post-reel-icon{position:absolute;top:7px;right:7px;color:#fff;opacity:.95;width:16px;height:16px;z-index:5;filter:drop-shadow(0 1px 3px rgba(0,0,0,.8));}
.post-stats{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:18px;color:#fff;font-size:.82rem;font-weight:800;opacity:0;transition:opacity .2s;pointer-events:none;z-index:6;text-shadow:0 2px 8px rgba(0,0,0,.75);}
.post-cell:hover .post-stats{opacity:1;}
.post-cap{position:absolute;bottom:0;left:0;right:0;padding:24px 8px 7px;background:linear-gradient(transparent,rgba(0,0,0,.7));font-size:.68rem;font-weight:600;color:#fff;line-height:1.3;opacity:0;transition:opacity .2s;z-index:7;}
.post-cell:hover .post-cap{opacity:1;}

.thumb-grocery{background:linear-gradient(135deg,#06351e 0%,#13965d 48%,#f4f0c9 100%);}

.thumb-dogday{background:linear-gradient(135deg,#2d1b0f 0%,#9a5a2e 50%,#f2d3a0 100%);}

/* ── THEME FAB ── */
.theme-fab{position:fixed;bottom:22px;right:22px;z-index:200;width:50px;height:50px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;font-size:1.3rem;transition:transform .2s;}
.theme-fab:hover{transform:scale(1.1);}

/* ── THEME PANEL ── */
.theme-panel{position:fixed;bottom:82px;right:18px;z-index:199;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;width:300px;max-height:82vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.55);transform:translateY(16px) scale(.96);opacity:0;pointer-events:none;transition:transform .25s cubic-bezier(.34,1.56,.64,1),opacity .2s;scrollbar-width:thin;}
.theme-panel.open{transform:translateY(0) scale(1);opacity:1;pointer-events:all;}
.p-title{font-size:.62rem;font-weight:700;letter-spacing:1.1px;text-transform:uppercase;color:var(--sub);margin-bottom:9px;margin-top:6px;}

/* colour swatches */
.color-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:14px;}
.c-swatch{aspect-ratio:1;border-radius:8px;cursor:pointer;border:2px solid transparent;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:3px;transition:transform .15s,border-color .15s;position:relative;}
.c-swatch:hover{transform:scale(1.1);}
.c-swatch.active{border-color:var(--accent);}
.c-swatch.active::after{content:'✓';position:absolute;top:3px;right:4px;font-size:.6rem;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.7);}
.c-label{font-size:.44rem;font-weight:800;color:rgba(15,23,42,.88);text-shadow:0 1px 2px rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.3px;}
.c-swatch:first-child .c-label{color:rgba(255,255,255,.9);text-shadow:0 1px 3px rgba(0,0,0,.7);}

/* wallpaper cards */
.wp-grid2{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.wp-card{aspect-ratio:1;border-radius:9px;cursor:pointer;border:2px solid transparent;overflow:hidden;position:relative;transition:transform .15s,border-color .15s;}
.wp-card:hover{transform:scale(1.06);}
.wp-card.active{border-color:var(--accent);}
.wp-card.active::after{content:'✓';position:absolute;top:4px;right:5px;font-size:.6rem;color:#fff;background:var(--accent);width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;line-height:15px;text-align:center;}
.wp-preview{position:absolute;inset:0;}
.wp-anim-badge{position:absolute;top:4px;left:5px;font-size:.42rem;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:#fff;background:rgba(255,200,0,.75);padding:1px 4px;border-radius:3px;}
.wp-name2{position:absolute;bottom:0;left:0;right:0;font-size:.48rem;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.7);padding:4px 5px;background:linear-gradient(transparent,rgba(0,0,0,.55));text-transform:uppercase;letter-spacing:.3px;}

/* ── WALLPAPER MINI-PREVIEWS (inside panel cards) ── */


/* Wavy Pattern */
.wp-p-wavy-pattern{
  --s: 26px;
  --c1: #AB3E5B;
  --c2: #FFBE40;
  --c3: #ACCEC0;
  --c4: #61A6AB;
  --_g:
    #0000 25%,#0008 47%,var(--c1) 53% 147%,var(--c2) 153% 247%,
    var(--c1) 253% 347%,var(--c2) 353% 447%,var(--c1) 453% 547%,#0008 553%,#0000 575%;
  --_s: calc(25%/3) calc(25%/4) at 50%;
  background:
    radial-gradient(var(--_s) 100%,var(--_g)),
    radial-gradient(var(--_s) 100%,var(--_g)) calc(var(--s)/2) calc(3*var(--s)/4),
    radial-gradient(var(--_s) 0,var(--_g)) calc(var(--s)/2) 0,
    radial-gradient(var(--_s) 0,var(--_g)) 0 calc(3*var(--s)/4),
    repeating-linear-gradient(90deg,var(--c3) calc(25%/-6) calc(25%/6),var(--c4) 0 calc(25%/2));
  background-size: var(--s) calc(3*var(--s)/2);
  animation:wavyPreview 2.5s linear infinite;
  position:relative;
  overflow:hidden;
}
.wp-p-wavy-pattern::after{content:'WAVY';position:absolute;bottom:6px;left:7px;color:#fff;font-size:.52rem;font-weight:800;letter-spacing:.08em;text-shadow:0 1px 4px #000;}
@keyframes wavyPreview{to{background-position:var(--s) 0,calc(var(--s)/-2) calc(3*var(--s)/4),calc(3*var(--s)/2) 0,calc(-1*var(--s)) calc(3*var(--s)/4),0 0}}

/* Stained Glass */
.wp-p-stained-glass{background:#102033;position:relative;overflow:hidden;}
.wp-p-stained-glass::before{content:'';position:absolute;inset:-30%;background:
  radial-gradient(circle at 20% 30%,rgba(255,0,120,.75) 0 7%,transparent 13%),
  radial-gradient(circle at 70% 25%,rgba(0,200,255,.75) 0 8%,transparent 15%),
  radial-gradient(circle at 50% 70%,rgba(255,210,0,.7) 0 8%,transparent 16%),
  radial-gradient(circle at 80% 75%,rgba(0,255,130,.65) 0 7%,transparent 14%),
  radial-gradient(circle at 30% 80%,rgba(160,80,255,.7) 0 7%,transparent 15%);
  mix-blend-mode:screen;animation:stainedGlassPreview 6s ease-in-out infinite alternate;}
.wp-p-stained-glass::after{content:'GLASS';position:absolute;bottom:6px;left:7px;color:#fff;font-size:.52rem;font-weight:800;letter-spacing:.08em;text-shadow:0 1px 4px #000;}
@keyframes stainedGlassPreview{from{transform:rotate(0deg) scale(1.15)}to{transform:rotate(30deg) scale(1.35)}}

/* ColorDrop */
.wp-p-colordrop{background:#000;position:relative;overflow:hidden;}
.wp-p-colordrop::before{content:'';position:absolute;inset:-20%;background:repeating-linear-gradient(90deg,rgba(255,0,90,.8) 0 4px,rgba(255,180,0,.8) 4px 8px,rgba(0,255,120,.8) 8px 12px,rgba(0,180,255,.8) 12px 16px,rgba(150,0,255,.8) 16px 20px,transparent 20px 32px);filter:blur(.4px);animation:prismP 1.6s linear infinite;}
.wp-p-colordrop::after{content:'DROP';position:absolute;bottom:6px;left:7px;color:#fff;font-size:.52rem;font-weight:800;letter-spacing:.08em;text-shadow:0 1px 4px #000;}


@media(max-width:600px){
  .profile-header{gap:16px;}

}

  padding-bottom:env(safe-area-inset-bottom);
}

img,svg,video,canvas{

}

button,
.tab,
.wp-card,
.c-swatch,
.theme-fab{

}

.ig-nav{

  padding-top:env(safe-area-inset-top);
}

  padding-inline:clamp(10px,3.5vw,16px);
}

  width:100%;
}

.row-username{

}

}

.theme-panel{

}

.post-grid{

/* ────────────────────────────────────────────────
   PROFILE HEADER: screenshot-style responsive layout
   ──────────────────────────────────────────────── */
.ig-nav{display:none;}
.ig-app{max-width:680px;padding-inline:32px;}
.profile-header.profile-header-real{
  display:grid;
  grid-template-columns:150px minmax(0,1fr);
  column-gap:28px;
  row-gap:22px;
  align-items:start;
  padding:20px 0 24px;
}
.profile-header-real .avatar-col{grid-column:1;grid-row:1;}
.profile-header-real .avatar-ring-wrap{
  width:150px;
  height:150px;
  padding:0;
  background:transparent;
  cursor:default;
}
.profile-header-real .avatar-inner{
  border:0;
  background:#111;
  box-shadow:none;
}
.profile-header-real .profile-info{
  grid-column:2;
  grid-row:1;
  padding-top:30px;
  min-width:0;
}
.profile-header-real .row-username{
  display:flex;
  align-items:center;
  gap:12px;
  margin:0 0 8px;
  flex-wrap:nowrap;
}
.profile-header-real .username{
  width:auto;
  max-width:100%;
  color:var(--text);
  font-size:1.55rem;
  line-height:1;
  font-weight:800;
  letter-spacing:.2px;
  text-shadow:0 1px 2px rgba(0,0,0,.55);
}
.settings-btn{
  width:28px;
  height:28px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  border:0;
  background:transparent;
  color:var(--text);
  cursor:pointer;
  padding:0;
  flex:0 0 auto;
  -webkit-tap-highlight-color:transparent;
}
.settings-btn svg{
  width:25px;
  height:25px;
  fill:none;
  stroke:currentColor;
  stroke-width:2.2;
  stroke-linecap:round;
  stroke-linejoin:round;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,.45));
}
.profile-header-real .bio-name{
  color:var(--text);
  font-size:.9rem;
  font-weight:700;
  margin:0 0 14px;
}
.profile-header-real .stats-row{
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:18px;
  width:auto;
  max-width:100%;
  margin:0 0 22px;
  padding:0;
  border:0;
  text-align:left;
}
.profile-header-real .stat{
  display:inline-flex;
  align-items:baseline;
  gap:4px;
  margin:0;
  min-width:auto;
  white-space:nowrap;
}
.profile-header-real .stat-num,
.profile-header-real .stat-label{
  display:inline;
  color:var(--text);
  font-size:.9rem;
  line-height:1.2;
  font-weight:800;
}
.profile-header-real .stat-label{font-weight:700;}
.profile-header-real .bio-text{
  color:var(--text);
  font-size:.95rem;
  line-height:1.35;
  margin:0 0 4px;
  font-weight:500;
}
.profile-link{
  display:inline-flex;
  align-items:center;
  max-width:100%;
  color:#3b82f6;
  font-size:.95rem;
  line-height:1.35;
  text-decoration:none;
  font-weight:500;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.profile-link:hover{text-decoration:underline;}
.profile-actions{
  grid-column:1 / -1;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  width:100%;
}
.profile-action-btn{
  min-height:45px;
  border-radius:10px;
  background:#262a2f;
  border-color:#262a2f;
  color:#fff;
  font-size:.92rem;
  font-weight:800;
  box-shadow:none;
}
.profile-action-btn:hover{opacity:.92;}
.highlights-row{display:none;}
.profile-tabs{margin-top:0;}

@media(max-width:760px){
  .ig-app{max-width:100%;padding-inline:32px;}
  .profile-header.profile-header-real{
    grid-template-columns:150px minmax(0,1fr);
    column-gap:28px;
  }
}

  .ig-app{padding-inline:20px;}
  .profile-header.profile-header-real{

  .profile-header.profile-header-real{

  }
  .profile-header-real .avatar-ring-wrap{width:96px;height:96px;}
  .profile-header-real .profile-info{padding-top:4px;}
  .profile-header-real .row-username{gap:8px;margin-bottom:7px;}
  .profile-header-real .username{font-size:1.2rem;}
  .profile-header-real .bio-name{font-size:.82rem;margin-bottom:9px;}
  .profile-header-real .stats-row{gap:10px;margin-bottom:15px;}

  .profile-header-real .stat-label{font-size:.78rem;}
  .profile-header-real .bio-text,
  .profile-link{font-size:.82rem;}
  .profile-actions{gap:7px;}
  .profile-action-btn{min-height:42px;border-radius:9px;font-size:.84rem;}
}

@media(max-width:360px){
  .profile-header.profile-header-real{grid-template-columns:82px minmax(0,1fr);column-gap:12px;}
  .profile-header-real .avatar-ring-wrap{width:82px;height:82px;}
  .profile-header-real .username{font-size:1.08rem;}
  .profile-header-real .stats-row{gap:7px;}
  .profile-header-real .stat-num,
  .profile-header-real .stat-label{font-size:.72rem;}
}

<script>

const prefersReducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function buildStainedGlass(){
  const wrap = document.getElementById('stainedGlassWrap');
  if(!wrap || wrap.childElementCount) return;

  for(let i = 0; i < 4; i++){
    const dot = document.createElement('span');
    dot.className = 'glass-dot';
    wrap.appendChild(dot);
  }
}

function getDropCount(){
  const w = window.innerWidth || document.documentElement.clientWidth || 1024;
  if(w <= 480) return 24;
  if(w <= 700) return 36;
  if(w <= 1000) return 54;
  return 84;
}

function buildColorDrop(){
  const wrap = document.getElementById('colordropWrap');
  if(!wrap || prefersReducedMotion) return;

  const total = getDropCount();
  if(wrap.dataset.total === String(total) && wrap.childElementCount) return;

  wrap.innerHTML = '';
  wrap.dataset.total = String(total);
  wrap.style.setProperty('--drop-count', total);

  const widthPercent = 100 / total;

  for(let i = 0; i < total; i++){
    const col = document.createElement('div');
    const hue = (300 / total) * (i + 1);
    const delay = -(((i * 37) % total) * (4 / total));

    col.className = 'color-drop-col';
    col.style.setProperty('--i', i);
    col.style.setProperty('--drop-width', widthPercent + '%');
    col.style.setProperty('--hue', hue.toFixed(2));
    col.style.setProperty('--delay', delay.toFixed(3) + 's');
    wrap.appendChild(col);
  }
}

  {id:'sakura', label:'Rosewood',bg:'#3b1728', ac:'#f472b6'},
  {id:'forest', label:'Sage',    bg:'#13251a', ac:'#4ade80'},
  {id:'dusk',   label:'Indigo',  bg:'#211a3d', ac:'#a78bfa'},
  {id:'sand',   label:'Mocha',   bg:'#3a2a1d', ac:'#f59e0b'},
  {id:'arctic', label:'Ocean',   bg:'#102a43', ac:'#38bdf8'},
  {id:'ember',  label:'Copper',  bg:'#3a1b12', ac:'#fb923c'},
  {id:'mint',   label:'Jade',    bg:'#102d2a', ac:'#2dd4bf'}
];

// Visible wallpaper options. Lava and all lower wallpaper options were removed from the picker.
const WALLPAPERS = [
  {id:'none', label:'None', pc:'wp-p-none', anim:false},
  {id:'colordrop', label:'ColorDrop', pc:'wp-p-colordrop', anim:true},
  {id:'stained-glass', label:'Stained Glass', pc:'wp-p-stained-glass', anim:true},
  {id:'wavy-pattern', label:'Wavy Pattern', pc:'wp-p-wavy-pattern', anim:true}
];

const WALLPAPER_THEME_MAP = {
  none: 'dark',
  colordrop: 'mint',
  'stained-glass': 'dusk',
  'wavy-pattern': 'ember'
};

function wrapActionButtonLetters(){
  document.querySelectorAll('.row-username .btn:not(.btn-more)').forEach(btn => {
    if (btn.dataset.lettersWrapped === 'true') return;

    const text = btn.textContent.trim();
    btn.textContent = '';

    [...text].forEach((char, index) => {
      const span = document.createElement('span');
      span.className = 'btn-letter';
      span.style.setProperty('--letter-index', index);
      span.textContent = char === ' ' ? '\u00a0' : char;
      btn.appendChild(span);
    });

    btn.dataset.lettersWrapped = 'true';
  });
}

let activeColor = 'dark';
let activeWp = 'none';

wrapActionButtonLetters();
buildColorDrop();
buildStainedGlass();

// Build colour swatches
const cg = document.getElementById('colorGrid');
COLOR_THEMES.forEach(t => {
  const sw = document.createElement('div');
  sw.className = 'c-swatch' + (t.id === activeColor ? ' active' : '');
  sw.dataset.theme = t.id;
  sw.style.background = `linear-gradient(135deg,${t.bg} 30%,${t.ac})`;
  sw.innerHTML = `<span class="c-label">${t.label}</span>`;
  sw.addEventListener('click', () => {
    document.querySelectorAll('.c-swatch').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    activeColor = t.id;
    applyTheme();
  });
  cg.appendChild(sw);
});

// Build wallpaper cards
const wg = document.getElementById('wpGrid');
WALLPAPERS.forEach(w => {
  const card = document.createElement('div');
  card.className = 'wp-card' + (w.id === activeWp ? ' active' : '');

  if(w.id === 'none'){
    card.innerHTML = `<div class="wp-preview" style="background:#111;display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:#444;">✕</div><span class="wp-name2">${w.label}</span>`;
  }else{
    card.innerHTML = `
      <div class="wp-preview ${w.pc}"></div>
      ${w.anim ? `<span class="wp-anim-badge">LIVE</span>` : ''}
      <span class="wp-name2">${w.label}</span>`;
  }

  card.addEventListener('click', () => {
    document.querySelectorAll('.wp-card').forEach(c => c.classList.remove('active'));
    card.classList.add('active');
    activeWp = w.id;

    if(WALLPAPER_THEME_MAP[w.id]){
      activeColor = WALLPAPER_THEME_MAP[w.id];
      document.querySelectorAll('.c-swatch').forEach(s => s.classList.remove('active'));
      const matchingSwatch = [...document.querySelectorAll('.c-swatch')]
        .find(s => s.dataset.theme === activeColor);
      if(matchingSwatch) matchingSwatch.classList.add('active');
    }

    applyTheme();
  });

  wg.appendChild(card);
});

function applyTheme(){
  document.body.className='';
  document.body.classList.add('theme-' + activeColor);

  if(activeWp !== 'none') document.body.classList.add('wp-' + activeWp);
  if(activeWp === 'colordrop') buildColorDrop();
}


let colorDropResizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(colorDropResizeTimer);
  colorDropResizeTimer = setTimeout(() => {
    if(activeWp === 'colordrop') buildColorDrop();
  }, 250);
}, {passive:true});

// FAB toggle
const fab   = document.getElementById('themeFab');
const panel = document.getElementById('themePanel');
fab.addEventListener('click',e=>{
  e.stopPropagation();
  panel.classList.toggle('open');
  fab.style.transform = panel.classList.contains('open') ? 'rotate(25deg) scale(1.1)' : '';
});
document.addEventListener('click',e=>{
  if(!panel.contains(e.target)&&e.target!==fab){
    panel.classList.remove('open'); fab.style.transform='';
  }
});

// Tabs
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
  });
});
</script>
</body>
</html>
